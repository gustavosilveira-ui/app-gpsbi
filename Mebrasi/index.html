<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Hub GPSBI Mebrasi</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#06172D; --navy2:#071B33; --navy3:#0B2545;
  --cyan:#36E2C9; --blue:#2D70B8;
  --text:#FFFFFF; --text2:#D8E6F3; --text3:#9FD8E6;
  --border2:rgba(255,255,255,0.12); --red:#ef6a6a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:var(--navy2);border:1px solid var(--border2);border-radius:16px;padding:36px;width:380px;max-width:92vw;box-shadow:0 20px 50px rgba(0,0,0,.4);}
.brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;margin-bottom:6px;}
.dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--blue));}
.sub{font-size:12px;color:var(--text3);margin-bottom:24px;}
label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:700;}
.field{margin-bottom:16px;}
input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:9px;padding:11px 12px;color:var(--text);font-family:'Sora',sans-serif;font-size:13px;outline:none;}
.btn{width:100%;padding:12px;border-radius:9px;border:none;background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;font-family:'Sora',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;margin-top:6px;}
.toggle{text-align:center;margin-top:16px;font-size:12px;color:var(--text3);}
.toggle a{color:var(--cyan);cursor:pointer;text-decoration:underline;}
.msg{font-size:12px;margin-top:12px;text-align:center;min-height:16px;}
.msg.error{color:var(--red);}
.msg.success{color:var(--cyan);}
</style>
</head>
<body>
<div class="box">
  <div class="brand"><span class="dot"></span> Hub GPSBI</div>
  <div class="sub" id="subLabel">Grupo Mebrasi — entre com seu e-mail corporativo</div>

  <div class="field"><label>E-mail</label><input type="email" id="email" placeholder="seuemail@empresa.com.br"></div>
  <div class="field"><label>Senha</label><input type="password" id="password" placeholder="••••••••"></div>
  <button class="btn" id="submitBtn" onclick="doLogin()">Entrar</button>
  <div class="msg" id="msg"></div>

  <div class="toggle" id="toggleWrap">
    Ainda não tem conta? <a onclick="toggleMode()">Cadastre-se</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hobpwhhpvwlwhmhairnp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvYnB3aGhwdndsd2htaGFpcm5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDkzNDksImV4cCI6MjA5OTAyNTM0OX0.j67wDzIZU755bcmanydd_E3TllYN5Ps2QcPH4A4rFUY';
const PANEL_URL = 'painel_mebrasi.html';

// TODO: confirmar com o Gustavo o domínio de e-mail oficial do Mebrasi e adicionar aqui
const ALLOWED_SIGNUP_DOMAINS = ['gpsbi.com.br'];

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let mode = 'login';

function isAllowedSignupEmail(email){
  const domain = (email.split('@')[1]||'').toLowerCase();
  return ALLOWED_SIGNUP_DOMAINS.includes(domain);
}
function setMsg(text, type){
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg' + (type ? ' '+type : '');
}
function toggleMode(){
  mode = mode==='login' ? 'signup' : 'login';
  document.getElementById('submitBtn').textContent = mode==='login' ? 'Entrar' : 'Criar conta';
  document.getElementById('toggleWrap').innerHTML = mode==='login'
    ? 'Ainda não tem conta? <a onclick="toggleMode()">Cadastre-se</a>'
    : 'Já tem conta? <a onclick="toggleMode()">Entrar</a>';
  setMsg('');
}

async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password){ setMsg('Preencha e-mail e senha.', 'error'); return; }

  if(mode==='signup'){
    if(!isAllowedSignupEmail(email)){
      setMsg(`Cadastro permitido apenas para e-mails ${ALLOWED_SIGNUP_DOMAINS.map(d=>'@'+d).join(' ou ')}.`, 'error');
      return;
    }
    const { error } = await sb.auth.signUp({ email, password, options:{ emailRedirectTo: window.location.origin + '/' + PANEL_URL } });
    if(error){ setMsg(error.message, 'error'); return; }
    toggleMode();
    setMsg('Conta criada! Verifique seu e-mail se for pedido, ou já tente entrar.', 'success');
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ setMsg('E-mail ou senha incorretos.', 'error'); return; }
    window.location.href = PANEL_URL;
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mural · Hub GPSBI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== theme.css embutido (Mebrasi ainda não hospeda esse arquivo separado) ===== */
/* ================================================================
   Hub GPSBI · Mebrasi — Tema compartilhado (embutido aqui, adaptado do padrão Tangram)
   Usado por todas as páginas (painel, simulador, agenda, mural, aprovações)
   ================================================================ */
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');

:root{
  --navy:#071B33; --navy2:#0B2545; --navy3:#123C68; --navy4:#17395B;
  --cyan:#36E2C9; --cyan2:#78F2E5; --blue:#2D70B8;
  --green:#2fd6b8; --red:#ef6a6a; --gold:#f5b942; --purple:#9b7fe8;
  --text:#FFFFFF; --text2:#D8E6F3; --text3:#9FD8E6;
  --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.14);
  --field-bg:rgba(255,255,255,.06);
  --shadow:0 18px 42px rgba(0,0,0,.22);
  --radius:14px; --radius-sm:10px;
}
html.light{
  --navy:#F6F9FC; --navy2:#FFFFFF; --navy3:#F1F6FB; --navy4:#E8FAF8;
  --cyan:#008D90; --cyan2:#36E2C9; --blue:#2D70B8;
  --text:#071B33; --text2:#344054; --text3:#667085;
  --border:rgba(7,27,51,.06); --border2:#E6EAF0;
  --field-bg:#FFFFFF;
  --shadow:0 18px 42px rgba(7,27,51,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{visibility:hidden;}
html,body{background:var(--navy);color:var(--text);font-family:'Sora',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;transition:background .25s,color .25s;}
.mono{font-family:'DM Mono',monospace;}
body{padding-bottom:40px;}
a{color:inherit;text-decoration:none;}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--cyan);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen p{margin-top:16px;font-size:12px;color:var(--text3);}

/* APP NAV (topo) */
.app-topbar{display:flex;align-items:center;gap:18px;padding:12px 24px;background:var(--navy2);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;flex-wrap:nowrap;overflow-x:auto;}
.app-brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px;flex:none;white-space:nowrap;}
.app-brand .dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--blue));}
.app-nav{display:flex;align-items:center;gap:4px;flex:none;flex-wrap:nowrap;}
.app-nav a{padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--text3);transition:all .15s;white-space:nowrap;flex:none;}
.app-nav a:hover{background:var(--navy3);color:var(--text);}
.app-nav a.active{background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;}
.app-right{display:flex;align-items:center;gap:10px;flex:none;}
.app-theme-toggle{display:flex;align-items:center;gap:4px;padding:4px;border-radius:999px;background:var(--navy3);border:1px solid var(--border2);}
.app-theme-toggle button{width:26px;height:26px;border-radius:50%;border:none;background:none;color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.app-theme-toggle button.active{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff;}
.app-theme-toggle svg{width:13px;height:13px;}
.app-user-chip{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 5px;border-radius:999px;background:var(--navy3);border:1px solid var(--border2);font-size:11.5px;font-weight:600;white-space:nowrap;flex:none;}
.app-user-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--blue));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;}
.app-logout{width:32px;height:32px;border-radius:50%;background:var(--navy3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);}
.app-logout svg{width:14px;height:14px;}

.content{max-width:1200px;margin:0 auto;padding:24px;}
.content.wide{max-width:1600px;}

/* CARDS / COMPONENTES GENÉRICOS */
.card{background:var(--navy2);border:1px solid var(--border2);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:18px;}
.card-title{font-size:16px;font-weight:800;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--text3);margin-bottom:16px;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;border:none;font-family:'Sora',sans-serif;font-size:12.5px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.9;}
.btn-primary{background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;}
.btn-ghost{background:var(--navy3);color:var(--text);border:1px solid var(--border2);}
.btn-danger{background:rgba(239,106,106,.15);color:var(--red);border:1px solid rgba(239,106,106,.3);}
.btn-sm{padding:6px 12px;font-size:11.5px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

input[type="text"],input[type="date"],input[type="number"],input[type="email"],textarea,select{
  width:100%;background:var(--field-bg);border:1px solid var(--border2);border-radius:9px;padding:10px 12px;
  color:var(--text);font-family:'Sora',sans-serif;font-size:13px;outline:none;
}
textarea{resize:vertical;min-height:70px;}
label.field-label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;font-weight:700;}
.field-group{margin-bottom:14px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;flex:none;white-space:nowrap;}
.badge-pendente{background:rgba(245,185,66,.15);color:var(--gold);}
.badge-aprovado{background:rgba(47,214,184,.15);color:var(--green);}
.badge-recusado{background:rgba(239,106,106,.15);color:var(--red);}

.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
.empty-state .icon{font-size:36px;margin-bottom:10px;}

@media(max-width:760px){
  .app-topbar{padding:10px 14px;}
  .field-row{grid-template-columns:1fr;}
  .content{padding:14px;}
}

/* ===== estilos específicos desta página ===== */
html{zoom:.8;}
.post-item{background:var(--navy3);border-radius:12px;padding:16px 18px;margin-bottom:12px;}
.post-item.pinned{border:1px solid rgba(245,185,66,.4);}
.post-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.post-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--blue));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex:none;}
.post-meta{flex:1;min-width:0;}
.post-author{font-size:12.5px;font-weight:700;}
.post-date{font-size:10.5px;color:var(--text3);}
.pin-badge{font-size:10px;background:rgba(245,185,66,.15);color:var(--gold);padding:3px 8px;border-radius:999px;font-weight:700;flex:none;}
.post-title{font-size:14px;font-weight:800;margin-bottom:4px;}
.post-msg{font-size:13px;color:var(--text2);line-height:1.5;white-space:pre-wrap;margin-bottom:10px;}
.post-actions{display:flex;align-items:center;gap:10px;}
.like-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:var(--navy4);border:1px solid var(--border2);cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);}
.like-btn.liked{background:rgba(58,233,209,.15);color:var(--cyan);border-color:rgba(58,233,209,.3);}
.post-del{margin-left:auto;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:12px;}
.post-del:hover{color:var(--red);}
.read-list{margin-top:10px;padding:10px 12px;background:var(--navy4);border-radius:8px;font-size:11.5px;color:var(--text2);line-height:1.6;}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p>Carregando o mural...</p>
</div>

<div id="deniedScreen" style="display:none;">
  <div class="content">
    <div class="card fc-denied" style="max-width:520px;margin:80px auto;text-align:center;">
      <div class="card-title">🔒 Acesso restrito</div>
      <div class="card-sub">Essa área é exclusiva pro time GPS e Mebrasi.</div>
    </div>
  </div>
</div>

<div id="mainContent" style="display:none;">
  <div class="app-topbar">
    <div class="app-brand"><span class="dot"></span> Hub GPSBI</div>
    <nav class="app-nav">
      <a href="painel.html">📊 Bi Comercial</a>
      <a href="fluxodecaixa.html" id="navFluxo">💰 Fluxo de Caixa</a>
      <a href="depositos.html" id="navRoberto">🏦 Depósitos</a>
      <a href="agenda.html" id="navAgenda">🗓️ Agenda</a>
      <a href="mural.html" id="navMural" class="active">📣 Mural</a>
      <a href="aprovacoes.html" id="navAprovacoes">✅ Aprovações</a>
    </nav>
    <div class="app-right">
      <div class="app-theme-toggle" id="appThemeToggle">
        <button id="appBtnDark" title="Escuro"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
        <button id="appBtnLight" title="Claro"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg></button>
      </div>
      <div class="app-user-chip" id="userChip"></div>
      <div class="app-logout" id="appLogoutBtn" title="Sair"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></div>
    </div>
  </div>

  <div class="content">
    <div class="card" id="newPostCard" style="display:none;">
      <div class="card-title">📣 Novo comunicado</div>
      <div class="card-sub">Só administradores podem publicar — todo mundo vê.</div>
      <div class="field-group">
        <label class="field-label">Título</label>
        <input type="text" id="postTitulo" placeholder="Ex: Nova meta de julho, Bem-vindo à equipe...">
      </div>
      <div class="field-group">
        <label class="field-label">Mensagem</label>
        <textarea id="postMensagem" placeholder="Escreva o comunicado..."></textarea>
      </div>
      <div class="field-group" style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="postFixado" style="width:auto;">
        <label for="postFixado" style="font-size:12.5px;color:var(--text2);">Fixar no topo</label>
      </div>
      <button class="btn btn-primary" onclick="submitPost()">Publicar</button>
    </div>

    <div class="card">
      <div class="card-title">Mural da Equipe</div>
      <div class="card-sub">Comunicados e avisos internos.</div>
      <div id="postsWrap"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hobpwhhpvwlwhmhairnp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvYnB3aGhwdndsd2htaGFpcm5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDkzNDksImV4cCI6MjA5OTAyNTM0OX0.j67wDzIZU755bcmanydd_E3TllYN5Ps2QcPH4A4rFUY';
const LOGIN_URL = 'index.html';
const OWNER_EMAILS = ['roberto@mebrasi.com.br', 'gustavosilveira@gpsbi.com.br'];
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function isOwner(email){ return OWNER_EMAILS.includes((email||'').toLowerCase()); }
function canAccessFluxo(email){
  email = (email||'').toLowerCase();
  return email.endsWith('@gpsbi.com.br') || email.endsWith('@mebrasi.com.br');
}
function isGpsStaff(email){ return (email||'').toLowerCase().endsWith('@gpsbi.com.br'); }
function podeVerFluxoCaixa(email){
  const e = (email||'').toLowerCase();
  return isGpsStaff(e) || e === 'roberto@mebrasi.com.br';
}
function appApplyTheme(t){
  document.documentElement.classList.toggle('light', t==='light');
  localStorage.setItem('mebrasi_theme', t);
  const bd=el('appBtnDark'), bl=el('appBtnLight');
  if(bd) bd.classList.toggle('active', t==='dark');
  if(bl) bl.classList.toggle('active', t==='light');
}
function nameFromEmail(email){ return email.split('@')[0].split('.').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' '); }
function el(id){ return document.getElementById(id); }

let currentUser=null, userEmail='', userName='', userRole='vendor';

async function init(){
  const { data } = await sb.auth.getSession();
  if(!data.session){ window.location.replace(LOGIN_URL); return; }
  currentUser = data.session.user;
  userEmail = currentUser.email;

  if(!canAccessFluxo(userEmail)){
    el('loadingScreen').style.display='none';
    el('deniedScreen').style.display='block';
    document.documentElement.style.visibility='visible';
    return;
  }

  userRole = isOwner(userEmail) ? 'owner' : 'vendor';
  userName = nameFromEmail(userEmail);

  document.documentElement.style.visibility='visible';
  el('userChip').textContent = userName;
  el('appLogoutBtn').addEventListener('click', doLogout);
  el('appBtnDark').addEventListener('click', ()=>appApplyTheme('dark'));
  el('appBtnLight').addEventListener('click', ()=>appApplyTheme('light'));
  appApplyTheme(localStorage.getItem('mebrasi_theme') || 'light');
  if(!podeVerFluxoCaixa(userEmail)){ const nf = el('navFluxo'); if(nf) nf.remove(); const nr = el('navRoberto'); if(nr) nr.remove(); }
  if(userRole==='owner') el('newPostCard').style.display='block';

  el('loadingScreen').style.display='none';
  el('mainContent').style.display='block';
  await loadPosts();
}

async function loadPosts(){
  const { data: posts, error } = await sb.from('comunicados').select('*').order('fixado',{ascending:false}).order('criado_em',{ascending:false});
  if(error){ el('postsWrap').innerHTML = '<div class="empty-state">⚠️ Não consegui carregar o mural. Verifique se a tabela comunicados existe no Supabase.</div>'; return; }
  const { data: reacoes } = await sb.from('comunicado_reacoes').select('*');
  const { data: leituras } = await sb.from('comunicado_leituras').select('*');
  renderPosts(posts||[], reacoes||[], leituras||[]);
}

function renderPosts(posts, reacoes, leituras){
  if(!posts.length){
    el('postsWrap').innerHTML = '<div class="empty-state"><div class="icon">📣</div>Nenhum comunicado ainda.</div>';
    return;
  }
  el('postsWrap').innerHTML = posts.map(p=>{
    const likes = reacoes.filter(r=>r.comunicado_id===p.id);
    const liked = likes.some(r=>r.usuario_email===userEmail);
    const leiturasPost = leituras.filter(l=>l.comunicado_id===p.id);
    const jaLeu = leiturasPost.some(l=>l.usuario_email===userEmail);
    const initials = (p.autor_nome||'--').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const date = new Date(p.criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const listaLeitores = leiturasPost.map(l=>`${l.usuario_nome||l.usuario_email} · ${new Date(l.lido_em).toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}`).join('<br>') || 'Ninguém confirmou leitura ainda.';
    return `<div class="post-item ${p.fixado?'pinned':''}">
      <div class="post-head">
        <div class="post-avatar">${initials}</div>
        <div class="post-meta"><div class="post-author">${p.autor_nome||p.autor_email}</div><div class="post-date">${date}</div></div>
        ${p.fixado ? '<span class="pin-badge">📌 Fixado</span>' : ''}
      </div>
      <div class="post-title">${p.titulo}</div>
      <div class="post-msg">${(p.mensagem||'').replace(/</g,'&lt;')}</div>
      <div class="post-actions">
        <button class="like-btn ${liked?'liked':''}" onclick="toggleLike(${p.id}, ${liked})">👍 ${likes.length||''}</button>
        <button class="like-btn ${jaLeu?'liked':''}" onclick="toggleRead(${p.id}, ${jaLeu})" ${jaLeu?'disabled':''}>${jaLeu?'✅ Lido, de acordo':'☑️ Marcar como lido'}</button>
        ${userRole==='owner' ? `<button class="like-btn" onclick="toggleReadList(${p.id})" title="${listaLeitores.replace(/"/g,'&quot;')}">👀 ${leiturasPost.length} leram</button>` : ''}
        ${userRole==='owner' ? `<button class="post-del" onclick="deletePost(${p.id})">Excluir</button>` : ''}
      </div>
      <div class="read-list" id="readList_${p.id}" style="display:none;">${listaLeitores}</div>
    </div>`;
  }).join('');
}
function toggleReadList(id){
  const el2 = document.getElementById('readList_'+id);
  if(el2) el2.style.display = el2.style.display==='none' ? 'block' : 'none';
}
async function toggleRead(comunicadoId, already){
  if(already) return;
  const { error } = await sb.from('comunicado_leituras').insert({ comunicado_id:comunicadoId, usuario_email:userEmail, usuario_nome:userName });
  if(!error) await loadPosts();
  else alert('Erro: '+error.message);
}

async function submitPost(){
  const titulo = el('postTitulo').value.trim();
  const mensagem = el('postMensagem').value.trim();
  const fixado = el('postFixado').checked;
  if(!titulo || !mensagem) return;
  const { error } = await sb.from('comunicados').insert({ autor_email:userEmail, autor_nome:userName, titulo, mensagem, fixado });
  if(!error){ el('postTitulo').value=''; el('postMensagem').value=''; el('postFixado').checked=false; await loadPosts(); }
  else alert('Erro ao publicar: '+error.message);
}
async function toggleLike(comunicadoId, liked){
  if(liked) await sb.from('comunicado_reacoes').delete().eq('comunicado_id', comunicadoId).eq('usuario_email', userEmail);
  else await sb.from('comunicado_reacoes').insert({ comunicado_id:comunicadoId, usuario_email:userEmail });
  await loadPosts();
}
async function deletePost(id){
  if(!confirm('Excluir esse comunicado?')) return;
  await sb.from('comunicados').delete().eq('id', id);
  await loadPosts();
}
async function doLogout(){ await sb.auth.signOut(); window.location.href = LOGIN_URL; }

init();
</script>
</body>
</html>

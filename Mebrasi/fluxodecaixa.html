<script>
const SUPABASE_URL = 'https://hobpwhhpvwlwhmhairnp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJob2Jwd2hocHZ3bHdobWhhaXJucCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzgzNDQ5MzQ5LCJleHAiOjIwOTkwMjUzNDl9.j67wDzIZU755bcmanydd_E3TllYN5Ps2QcPH4A4rFUY';
const LOGIN_URL = 'index.html';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
function nameFromEmail(email){ return email.split('@')[0].split('.').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' '); }
async function doLogout(){ await sb.auth.signOut(); window.location.href=LOGIN_URL; }
async function init(){
 const { data } = await sb.auth.getSession();
 if(!data.session){ window.location.replace(LOGIN_URL); return; }
 const user=data.session.user;
 renderAppNav({ activePage:'fluxodecaixa.html', userLabel:nameFromEmail(user.email), userRole:user.email.endsWith('@gpsbi.com.br')?'owner':'vendor', onLogout:doLogout, sb, currentUser:user });
 document.getElementById('loadingScreen').style.display='none';
 document.getElementById('mainContent').style.display='block';
}
init();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub GPSBI · Domine</title>
<?!= include_('Theme'); ?>
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.auth-card{width:400px;max-width:100%;background:var(--navy2);border:1px solid var(--border2);border-radius:var(--radius);padding:34px 30px;box-shadow:var(--shadow);}
.auth-title{font-size:20px;font-weight:800;margin-bottom:4px;}
.auth-sub{font-size:12.5px;color:var(--text3);margin-bottom:26px;}
.auth-error{background:rgba(239,106,106,.12);color:var(--neg);border:1px solid rgba(239,106,106,.3);padding:10px 12px;border-radius:9px;font-size:12.5px;margin-bottom:16px;display:none;}
.auth-error.show{display:block;}
.auth-toggle{text-align:center;margin-top:14px;font-size:12px;color:var(--text3);cursor:pointer;}
.auth-toggle:hover{color:var(--text);}
</style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-title">🔒 Hub GPSBI · Domine</div>
    <div class="auth-sub" id="formSub">Entre com seu usuário e senha.</div>
    <div class="auth-error" id="authError"><? if (typeof erro !== 'undefined' && erro) { ?><?= erro ?><? } ?></div>

    <div id="formLogin">
      <div class="field-group">
        <label class="field-label">Usuário</label>
        <input type="text" id="loginUsuario" placeholder="seu usuário">
      </div>
      <div class="field-group">
        <label class="field-label">Senha</label>
        <input type="password" id="loginSenha" placeholder="sua senha">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="fazerLogin()">Entrar</button>
      <div class="auth-toggle" onclick="mostrarTrocarSenha()">Esqueci/quero trocar minha senha</div>
    </div>

    <div id="formTrocarSenha" style="display:none;">
      <div class="field-group">
        <label class="field-label">Usuário</label>
        <input type="text" id="tsUsuario" placeholder="seu usuário">
      </div>
      <div class="field-group">
        <label class="field-label">Senha atual</label>
        <input type="password" id="tsSenhaAtual" placeholder="senha atual">
      </div>
      <div class="field-group">
        <label class="field-label">Nova senha</label>
        <input type="password" id="tsSenhaNova" placeholder="nova senha (mín. 4 caracteres)">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="fazerTrocaSenha()">Salvar nova senha</button>
      <div class="auth-toggle" onclick="mostrarLogin()">Voltar pro login</div>
      <div style="font-size:11px;color:var(--text3);margin-top:12px;">Não sabe a senha atual? Peça pra equipe GPS resetar direto na planilha de usuários.</div>
    </div>
  </div>

<script>
function showError(msg){ const el = document.getElementById('authError'); el.textContent = msg; el.classList.add('show'); }
function mostrarTrocarSenha(){
  document.getElementById('formLogin').style.display = 'none';
  document.getElementById('formTrocarSenha').style.display = 'block';
  document.getElementById('formSub').textContent = 'Troque sua senha informando a atual.';
  document.getElementById('authError').classList.remove('show');
}
function mostrarLogin(){
  document.getElementById('formLogin').style.display = 'block';
  document.getElementById('formTrocarSenha').style.display = 'none';
  document.getElementById('formSub').textContent = 'Entre com seu usuário e senha.';
  document.getElementById('authError').classList.remove('show');
}
function fazerLogin(){
  const usuario = document.getElementById('loginUsuario').value.trim();
  const senha = document.getElementById('loginSenha').value;
  if(!usuario || !senha){ showError('Preencha usuário e senha.'); return; }
  google.script.run.withSuccessHandler(res=>{
    if(!res.ok){ showError(res.erro); return; }
    const url = window.location.href.split('?')[0] + '?page=painel&token=' + encodeURIComponent(res.token);
    window.top.location.href = url;
  }).withFailureHandler(e=>showError('Erro: '+e.message)).login(usuario, senha);
}
function fazerTrocaSenha(){
  const usuario = document.getElementById('tsUsuario').value.trim();
  const senhaAtual = document.getElementById('tsSenhaAtual').value;
  const senhaNova = document.getElementById('tsSenhaNova').value;
  if(!usuario || !senhaAtual || !senhaNova){ showError('Preencha todos os campos.'); return; }
  google.script.run.withSuccessHandler(res=>{
    if(!res.ok){ showError(res.erro); return; }
    mostrarLogin();
    document.getElementById('loginUsuario').value = usuario;
    alert('Senha alterada! Entre com a senha nova.');
  }).withFailureHandler(e=>showError('Erro: '+e.message)).trocarSenhaComUsuario(usuario, senhaAtual, senhaNova);
}
</script>
</body>
</html>

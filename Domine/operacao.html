<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Domine Hub · Operação</title><link rel="stylesheet" href="css/app.css"></head><body><div class="app"><aside class="sidebar"><div class="brand">DOMINE<small>HUB GPSBI</small></div><nav class="nav"><a href="painel.html">▦ Painel Gerencial</a><a class="active" href="operacao.html">☷ Operação Detalhada</a><a href="agenda.html">◫ Agenda</a><a href="mural.html">◉ Mural</a><a href="aprovacoes.html">✓ Aprovações</a></nav><div class="sidebar-foot"><button class="btn btn-ghost" id="logoutBtn" style="width:100%">Sair</button></div></aside><main class="content"><header class="topbar"><h1>Operação Detalhada</h1><button class="btn btn-ghost" id="themeBtn">Tema</button></header><div class="main"><div class="filters"><select id="empresa"></select><input id="search" placeholder="Buscar motorista, pedido ou placa"><button class="btn btn-primary" id="apply">Aplicar</button></div><section class="card section"><div class="table-wrap"><table><thead><tr><th>Data</th><th>Empresa</th><th>Pedido/Loja</th><th>Motorista</th><th>Placa</th><th>Rota</th><th>Agendamento</th><th>Carregamento</th><th>Saída</th><th>Chegada loja</th><th>Saída loja</th><th>Status</th></tr></thead><tbody id="rows"></tbody></table></div></section></div></main></div><script src="config.js"></script><script src="js/data.js"></script><script src="js/app.js"></script><script>let all=[];DOMINE_CONFIG.companies.forEach(x=>empresa.add(new Option(x,x)));function render(){const q=DomineData.norm(search.value);const f=all.filter(r=>(empresa.value==='Global'||r.empresa===empresa.value)&&(!q||DomineData.norm([r.motorista,r.pedido,r.placa].join(' ')).includes(q)));rows.innerHTML=f.map(r=>`<tr><td>${r.data}</td><td>${r.empresa}</td><td>${r.pedido||'-'}</td><td>${r.motorista||'-'}</td><td>${r.placa||'-'}</td><td>${r.rota||'-'}</td><td class="mono">${r.agendamento||'-'}</td><td class="mono">${r.carregamento||'-'}</td><td class="mono">${r.saida||'-'}</td><td class="mono">${r.chegadaLoja||'-'}</td><td class="mono">${r.saidaLoja||'-'}</td><td><span class="status-pill">${DOMINE_CONFIG.statusLabels[r.status]||r.status||'Sem status'}</span></td></tr>`).join('')||'<tr><td colspan="12" class="empty">Nenhum registro encontrado.</td></tr>'}apply.onclick=render;DomineData.load().then(r=>{all=r;render()});</script></body></html>
